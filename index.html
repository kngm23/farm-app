<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>農作業管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--green:#2D6A4F;--green-light:#52B788;--green-pale:#D8F3DC;--red:#E76F51;--bg:#F8FAF8;--surface:#fff;--border:#D1E8D4;--text:#1B3A2D;--text-sub:#5A7F6A;--text-hint:#9AB89F;--radius:12px;--shadow:0 2px 12px rgba(45,106,79,.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700}
.header-actions{display:flex;gap:8px}
.icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:99}
.nav-btn{flex:1;padding:10px 2px 9px;font-size:11px;font-family:inherit;background:none;border:none;cursor:pointer;color:var(--text-sub);border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.nav-btn .icon{font-size:17px}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.page{display:none;flex:1;padding:14px}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.section-label{font-size:11px;font-weight:700;color:var(--text-sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--text-sub);display:block;margin-bottom:5px;font-weight:500}
input[type=text],input[type=date],input[type=time],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--green-light);background:#fff}
textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* 作業者選択はプルダウン方式（.mem-dropdown-* を使用）*/

.progress-row{display:flex;align-items:center;gap:10px}
.progress-row input[type=range]{flex:1;accent-color:var(--green)}
.prog-val{font-size:16px;font-weight:700;color:var(--green);min-width:44px;text-align:right}
.btn{padding:12px;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--green);color:#fff}
.btn-secondary{background:var(--green-pale);color:var(--green)}
.btn-danger{background:#FEE2E2;color:var(--red)}
.btn-sm{padding:7px 13px;font-size:13px;width:auto;border-radius:7px}
.log-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:9px;box-shadow:var(--shadow)}
.log-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.log-date{font-size:12px;color:var(--text-sub)}
.log-cat{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.log-detail{font-size:13px;color:var(--text-sub);margin-bottom:6px;white-space:pre-wrap}
.log-meta{font-size:12px;color:var(--text-hint)}
.pbar{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.pbar-fill{height:100%;background:var(--green-light);border-radius:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-done{background:var(--green-pale);color:var(--green)}
.badge-mid{background:#FEF9C3;color:#92400E}
.badge-low{background:#F1F5F9;color:var(--text-sub)}
.log-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.log-actions button{flex:1}
.filter-bar{display:flex;gap:8px;margin-bottom:12px}
.filter-bar select{flex:1;font-size:13px;padding:8px 10px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav button{background:var(--green-pale);border:none;color:var(--green);border-radius:8px;padding:7px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.cal-title{font-size:17px;font-weight:700}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px}
.cal-head span{font-size:11px;color:var(--text-sub);font-weight:500;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:8px;cursor:pointer;color:var(--text)}
.cal-day.other{color:var(--text-hint)}
.cal-day.has-work{background:var(--green-pale);color:var(--green);font-weight:700}
.cal-day.today{outline:2px solid var(--green-light);outline-offset:-1px}
.cal-detail{margin-top:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--text-sub);font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:700;color:var(--green)}
.bar-row{margin-bottom:12px}
.bar-row-top{display:flex;justify-content:space-between;margin-bottom:5px}
.bar-name{font-size:13px;color:var(--text)}
.bar-hrs{font-size:13px;font-weight:700;color:var(--green)}
.bar-bg{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--green-light);border-radius:4px}
.mem-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;background:var(--surface)}
.mem-left{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
.mem-name{font-size:14px;font-weight:500}
.mem-hrs{font-size:12px;color:var(--text-sub);margin-top:1px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--border);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--text-sub)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 22px;border-radius:25px;font-size:14px;font-weight:500;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.status-bar{padding:8px 14px;font-size:12px;text-align:center;display:none}
.status-ok{background:var(--green-pale);color:var(--green)}
.status-err{background:#FEE2E2;color:var(--red)}
.status-loading{background:#FEF9C3;color:#92400E}
.fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(45,106,79,.35);z-index:150;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.93)}
.fab.syncing{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.config-info{background:var(--green-pale);border-radius:10px;padding:12px;font-size:13px;color:var(--green);line-height:1.7;margin-bottom:14px}
.add-inline{display:flex;gap:8px}
.add-inline input{flex:1}
/* 作業者プルダウン */
.mem-dropdown-wrap{position:relative}
.mem-dropdown-trigger{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;-webkit-user-select:none;user-select:none;min-height:44px;transition:border-color .15s}
.mem-dropdown-trigger.open{border-color:var(--green-light);background:#fff}
.mem-dropdown-label{font-size:15px;color:var(--text)}
.mem-dropdown-label.placeholder{color:var(--text-hint)}
.mem-dropdown-arrow{font-size:11px;color:var(--text-hint);transition:transform .2s;flex-shrink:0;margin-left:8px}
.mem-dropdown-arrow.open{transform:rotate(180deg)}
.mem-dropdown-list{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(45,106,79,.12);z-index:50;max-height:260px;overflow-y:auto}
.mem-dropdown-list.open{display:block}
.mem-dropdown-item{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);-webkit-user-select:none;user-select:none;transition:background .1s}
.mem-dropdown-item:last-child{border-bottom:none}
.mem-dropdown-item:active{background:var(--green-pale)}
.mem-dropdown-chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
.mem-dropdown-item.selected .mem-dropdown-chk{background:var(--green);border-color:var(--green)}
.mem-dropdown-item.selected .mem-dropdown-chk::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.mem-dropdown-item.selected{background:var(--green-pale)}
.mem-dropdown-name{font-size:15px;color:var(--text)}
.mem-dropdown-item.selected .mem-dropdown-name{color:var(--green);font-weight:500}
/* 出勤ステータス */
.attend-status-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.attend-status-item:last-child{border-bottom:none}
.attend-name{font-size:14px;color:var(--text);font-weight:500}
.attend-time{font-size:13px;font-weight:700;color:var(--green)}
.attend-none{font-size:13px;color:var(--text-hint)}
.attend-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:var(--green-pale);color:var(--green)}
.attend-badge-none{background:#F1F5F9;color:var(--text-sub)}
/* 集計アコーディオン */
.acc-row{margin-bottom:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.acc-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;background:var(--surface);-webkit-user-select:none;user-select:none;transition:background .15s}
.acc-header:active{background:var(--green-pale)}
.acc-title{font-size:13px;color:var(--text);font-weight:500}
.acc-right{display:flex;align-items:center;gap:8px}
.acc-hrs{font-size:13px;font-weight:700;color:var(--green)}
.acc-arrow{font-size:11px;color:var(--text-hint);transition:transform .2s}
.acc-arrow.open{transform:rotate(180deg)}
.acc-bar{height:6px;background:var(--border);margin:0 14px 10px;border-radius:3px;overflow:hidden}
.acc-bar-fill{height:100%;background:var(--green-light);border-radius:3px}
.acc-body{display:none;background:var(--bg);border-top:1px solid var(--border)}
.acc-body.open{display:block}
.acc-item{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.acc-item:last-child{border-bottom:none}
.acc-item-name{font-size:12px;color:var(--text-sub)}
.acc-item-hrs{font-size:12px;font-weight:700;color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌱 農作業管理</h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="exportCSV()">📥</button>
      <button class="icon-btn" onclick="showPage('settings',document.querySelector('[data-page=settings]'))">⚙️</button>
    </div>
  </div>
  <div id="status-bar" class="status-bar"></div>
  <nav class="nav">
    <button class="nav-btn" data-page="attend" onclick="showPage('attend',this)"><span class="icon">🏃</span>出勤</button>
    <button class="nav-btn active" data-page="record" onclick="showPage('record',this)"><span class="icon">✏️</span>記録</button>
    <button class="nav-btn" data-page="log" onclick="showPage('log',this)"><span class="icon">📋</span>履歴</button>
    <button class="nav-btn" data-page="stats" onclick="showPage('stats',this)"><span class="icon">📊</span>集計</button>
    <button class="nav-btn" data-page="members" onclick="showPage('members',this)"><span class="icon">👥</span>メンバー</button>
  </nav>

  <!-- 出勤 -->
  <div id="page-attend" class="page">
    <div class="card">
      <div class="section-label">出勤を記録</div>
      <div class="field">
        <label>作業日</label>
        <input type="date" id="att-date">
      </div>
      <div class="field">
        <label>出勤者（複数選択可）</label>
        <div class="mem-dropdown-wrap">
          <div class="mem-dropdown-trigger" id="att-mem-trigger" onclick="toggleMemDropdown('att')">
            <span class="mem-dropdown-label placeholder" id="att-mem-label">タップして選択</span>
            <span class="mem-dropdown-arrow" id="att-mem-arrow">▼</span>
          </div>
          <div class="mem-dropdown-list" id="att-mem-list"></div>
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>出勤時刻</label>
        <input type="time" id="att-time">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveAttend()" style="margin-bottom:14px">🏃 出勤を記録する</button>
    <div class="card">
      <div class="section-label">本日の出勤状況</div>
      <div id="attend-status-list"><p style="color:var(--text-hint);font-size:14px;text-align:center;padding:16px 0">読み込み中...</p></div>
    </div>
  </div>

  <!-- 記録入力 -->
  <div id="page-record" class="page active">
    <div class="card">
      <div class="section-label">新しい作業を記録</div>
      <div class="field">
        <label>作業日</label>
        <input type="date" id="rec-date">
      </div>
      <div class="field">
        <label>作業者（複数選択可）</label>
        <div class="mem-dropdown-wrap">
          <div class="mem-dropdown-trigger" id="rec-mem-trigger" onclick="toggleMemDropdown('rec')">
            <span class="mem-dropdown-label placeholder" id="rec-mem-label">タップして選択</span>
            <span class="mem-dropdown-arrow" id="rec-mem-arrow">▼</span>
          </div>
          <div class="mem-dropdown-list" id="rec-mem-list"></div>
        </div>
      </div>
      <div class="field">
        <label>作業時間</label>
        <div class="row2">
          <div><label style="margin-bottom:4px">開始</label><input type="time" id="rec-start" value="09:00"></div>
          <div><label style="margin-bottom:4px">終了</label><input type="time" id="rec-end" value="15:00"></div>
        </div>
      </div>
      <div class="field">
        <label>作業カテゴリ</label>
        <select id="rec-cat">
          <option>播種（種まき）</option><option>定植・移植</option><option>施肥・追肥</option>
          <option>防除・消毒</option><option>除草・草刈り</option><option>収穫</option>
          <option>選果・出荷調整</option><option>灌水</option><option>整枝・剪定</option>
          <option>土壌管理・耕耘</option><option>その他</option>
        </select>
      </div>
      <div class="field">
        <label>作業内容（詳細）</label>
        <textarea id="rec-detail" placeholder="具体的な内容を入力..."></textarea>
      </div>
      <div class="field">
        <label>進捗状況</label>
        <div class="progress-row">
          <input type="range" min="0" max="100" step="5" value="50" id="rec-prog" oninput="document.getElementById('prog-num').textContent=this.value+'%'">
          <span class="prog-val" id="prog-num">50%</span>
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>メモ・天気など</label>
        <textarea id="rec-memo" placeholder="天気・気温・備考..." style="min-height:50px"></textarea>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveRecord()">💾 記録を保存・送信</button>
  </div>

  <!-- 作業履歴 -->
  <div id="page-log" class="page">
    <div class="filter-bar">
      <select id="f-member" onchange="renderLog()"><option value="">全メンバー</option></select>
      <select id="f-month" onchange="renderLog()">
        <option value="">全月</option>
        <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option><option value="04">4月</option>
        <option value="05">5月</option><option value="06">6月</option><option value="07">7月</option><option value="08">8月</option>
        <option value="09">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div id="log-list"></div>
  </div>

  <!-- カレンダー -->
  <div id="page-calendar" class="page">
    <div class="cal-nav">
      <button onclick="calMove(-1)">＜</button>
      <span class="cal-title" id="cal-title"></span>
      <button onclick="calMove(1)">＞</button>
    </div>
    <div class="cal-head">
      <span style="color:#E76F51">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span style="color:#52B788">土</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-detail" id="cal-detail"></div>
  </div>

  <!-- 集計 -->
  <div id="page-stats" class="page">
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">総作業日数</div><div class="stat-val" id="st-days">0</div></div>
      <div class="stat-box"><div class="stat-label" id="st-hours-label">1人あたり平均稼働時間</div><div class="stat-val" id="st-hours">0h</div></div>
    </div>
    <div class="card"><div class="section-label">メンバー別 稼働時間</div><div id="stats-mem"></div></div>
    <div class="card"><div class="section-label">カテゴリ別 作業時間</div><div id="stats-cat"></div></div>
  </div>

  <!-- メンバー管理 -->
  <div id="page-members" class="page">
    <div class="card">
      <div class="section-label">メンバー登録・管理</div>
      <div class="add-inline" style="margin-bottom:14px">
        <input type="text" id="new-mem" placeholder="名前を入力">
        <button class="btn btn-primary btn-sm" onclick="addMember()">追加</button>
      </div>
      <div id="mem-list"></div>
    </div>
  </div>

  <!-- 設定 -->
  <div id="page-settings" class="page">
    <div class="card">
      <div class="section-label">クラウド連携設定</div>
      <div class="config-info"><strong>Google Apps Script URL</strong>を入力すると全員がリアルタイムでデータを共有できます。</div>
      <div class="field">
        <label>Apps Script URL</label>
        <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/..." style="font-size:12px">
      </div>
      <button class="btn btn-primary" onclick="saveGasUrl()" style="margin-bottom:10px">URLを保存</button>
      <button class="btn btn-secondary" onclick="testConnection()">接続テスト</button>
    </div>
    <div class="card">
      <div class="section-label">データ管理</div>
      <button class="btn btn-secondary" onclick="syncAll()" style="margin-bottom:10px">☁️ クラウドから同期</button>
      <button class="btn btn-danger" onclick="clearLocal()">ローカルデータをリセット</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">作業記録を編集</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field"><label>作業日</label><input type="date" id="e-date"></div>
    <div class="field">
      <label>作業者（複数選択可）</label>
      <div class="mem-dropdown-wrap">
        <div class="mem-dropdown-trigger" id="edit-mem-trigger" onclick="toggleMemDropdown('edit')">
          <span class="mem-dropdown-label placeholder" id="edit-mem-label">タップして選択</span>
          <span class="mem-dropdown-arrow" id="edit-mem-arrow">▼</span>
        </div>
        <div class="mem-dropdown-list" id="edit-mem-list"></div>
      </div>
    </div>
    <div class="field row2">
      <div><label>開始</label><input type="time" id="e-start"></div>
      <div><label>終了</label><input type="time" id="e-end"></div>
    </div>
    <div class="field"><label>カテゴリ</label>
      <select id="e-cat">
        <option>播種（種まき）</option><option>定植・移植</option><option>施肥・追肥</option>
        <option>防除・消毒</option><option>除草・草刈り</option><option>収穫</option>
        <option>選果・出荷調整</option><option>灌水</option><option>整枝・剪定</option>
        <option>土壌管理・耕耘</option><option>その他</option>
      </select>
    </div>
    <div class="field"><label>作業内容</label><textarea id="e-detail"></textarea></div>
    <div class="field">
      <label>進捗（<span id="e-prog-num">50</span>%）</label>
      <input type="range" min="0" max="100" step="5" id="e-prog" oninput="document.getElementById('e-prog-num').textContent=this.value">
    </div>
    <div class="field"><label>メモ</label><textarea id="e-memo" style="min-height:50px"></textarea></div>
    <button class="btn btn-primary" onclick="updateRecord()" style="margin-bottom:8px">✅ 保存する</button>
    <button class="btn btn-danger" onclick="deleteRecord()">🗑️ この記録を削除</button>
  </div>
</div>

<button class="fab" id="sync-fab" onclick="syncAll()">☁️</button>
<div class="toast" id="toast"></div>

<script>
// 旧バージョンのデータを自動移行（farmApp2/3/4 -> farmApp）
(function() {
  var current = localStorage.getItem('farmApp');
  var currentData = current ? JSON.parse(current) : null;
  var hasData = currentData && currentData.records && currentData.records.length > 0;
  if (!hasData) {
    var oldKeys = ['farmApp4', 'farmApp3', 'farmApp2'];
    for (var i = 0; i < oldKeys.length; i++) {
      var old = localStorage.getItem(oldKeys[i]);
      if (old) {
        try {
          var d = JSON.parse(old);
          if (d.records && d.records.length > 0) {
            localStorage.setItem('farmApp', old);
            break;
          }
        } catch(e) {}
      }
    }
  }
})();

let state = JSON.parse(localStorage.getItem('farmApp') || '{"members":[],"records":[],"attendances":[]}');
let gasUrl = localStorage.getItem('gasUrl') || '';
let editId = null;
let calY = new Date().getFullYear(), calM = new Date().getMonth();

function save() { localStorage.setItem('farmApp', JSON.stringify(state)); }
function saveGasUrl() { gasUrl = document.getElementById('gas-url').value.trim(); localStorage.setItem('gasUrl', gasUrl); toast('URLを保存しました'); }

function toast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', dur);
}
function setStatus(msg, type) {
  const b = document.getElementById('status-bar');
  if (!msg) { b.style.display = 'none'; return; }
  b.textContent = msg; b.className = 'status-bar status-' + type; b.style.display = 'block';
}

// ---- データ正規化（1899年バグ対策）----
function normalizeTime(val) {
  if (!val) return '';
  var s = String(val);
  // 1899年形式 "1899-12-29T21:00:00.000Z" → "21:00"
  if (s.includes('1899') || s.includes('T')) {
    var d = new Date(s);
    if (!isNaN(d.getTime())) {
      var h = String(d.getUTCHours()).padStart(2,'0');
      var m = String(d.getUTCMinutes()).padStart(2,'0');
      return h + ':' + m;
    }
  }
  // "HH:MM:SS" → "HH:MM"
  if (s.length === 8 && s[2] === ':') return s.slice(0,5);
  return s;
}
function normalizeDate(val) {
  if (!val) return '';
  var s = String(val);
  // ISOString形式 "2026-03-14T15:00:00.000Z" → "2026-03-14"
  if (s.includes('T')) return s.split('T')[0];
  return s;
}
function normalizeRecord(r) {
  return {
    id: r.id,
    date: normalizeDate(r.date),
    start: normalizeTime(r.start),
    end: normalizeTime(r.end),
    category: r.category || '',
    detail: r.detail || '',
    progress: Number(r.progress) || 0,
    members: Array.isArray(r.members) ? r.members : [],
    memo: r.memo || ''
  };
}

// ---- 作業者プルダウン選択 ----
function buildMemDropdown(ns) {
  const list = document.getElementById(ns + '-mem-list');
  if (!list) return;
  if (!state.members.length) {
    list.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--text-hint)">メンバータブで登録してください</div>';
    updateMemLabel(ns);
    return;
  }
  const currentSelected = getSelectedMembers(ns);
  list.innerHTML = state.members.map((m, idx) => {
    const sel = currentSelected.includes(m);
    return `<div class="mem-dropdown-item ${sel?'selected':''}" id="mdi-${ns}-${idx}" data-name="${m.replace(/"/g,'&quot;')}" onclick="toggleMemItem('${ns}',${idx})">
      <div class="mem-dropdown-chk"></div>
      <span class="mem-dropdown-name">${m}</span>
    </div>`;
  }).join('');
  updateMemLabel(ns);
}

function toggleMemDropdown(ns) {
  const list = document.getElementById(ns + '-mem-list');
  const trigger = document.getElementById(ns + '-mem-trigger');
  const arrow = document.getElementById(ns + '-mem-arrow');
  if (!list) return;
  const isOpen = list.classList.contains('open');
  // 全てのプルダウンを閉じる（rec/edit/att）
  ['rec','edit','att'].forEach(n => {
    document.getElementById(n+'-mem-list')?.classList.remove('open');
    document.getElementById(n+'-mem-trigger')?.classList.remove('open');
    document.getElementById(n+'-mem-arrow')?.classList.remove('open');
  });
  if (!isOpen) {
    buildMemDropdown(ns);
    list.classList.add('open');
    trigger.classList.add('open');
    arrow.classList.add('open');
  }
}

function toggleMemItem(ns, idx) {
  const item = document.getElementById('mdi-' + ns + '-' + idx);
  if (!item) return;
  item.classList.toggle('selected');
  updateMemLabel(ns);
  // 記録ページで選択した場合、出勤時刻を自動セット
  if (ns === 'rec') applyAttendTime();
}

function updateMemLabel(ns) {
  const label = document.getElementById(ns + '-mem-label');
  if (!label) return;
  const selected = getSelectedMembers(ns);
  if (selected.length === 0) {
    label.textContent = 'タップして選択';
    label.classList.add('placeholder');
  } else {
    label.textContent = selected.length + '名選択中';
    label.classList.remove('placeholder');
  }
}

function getSelectedMembers(ns) {
  const list = document.getElementById(ns + '-mem-list');
  if (!list) return [];
  return [...list.querySelectorAll('.mem-dropdown-item.selected')].map(el => el.dataset.name);
}

function renderMemberGrid(containerId, selectedMembers) {
  const ns = containerId.includes('rec') ? 'rec' : containerId.includes('att') ? 'att' : 'edit';
  const list = document.getElementById(ns + '-mem-list');
  const label = document.getElementById(ns + '-mem-label');
  if (list) { list.innerHTML = ''; list.classList.remove('open'); }
  if (label) { label.textContent = 'タップして選択'; label.classList.add('placeholder'); }
  document.getElementById(ns+'-mem-trigger')?.classList.remove('open');
  document.getElementById(ns+'-mem-arrow')?.classList.remove('open');
  if (selectedMembers && selectedMembers.length && list && state.members.length) {
    list.innerHTML = state.members.map((m, idx) => {
      const sel = selectedMembers.includes(m);
      return `<div class="mem-dropdown-item ${sel?'selected':''}" id="mdi-${ns}-${idx}" data-name="${m.replace(/"/g,'&quot;')}" onclick="toggleMemItem('${ns}',${idx})">
        <div class="mem-dropdown-chk"></div>
        <span class="mem-dropdown-name">${m}</span>
      </div>`;
    }).join('');
    updateMemLabel(ns);
  }
}

document.addEventListener('click', function(e) {
  ['rec','edit','att'].forEach(ns => {
    const trigger = document.getElementById(ns+'-mem-trigger');
    const list = document.getElementById(ns+'-mem-list');
    if (trigger && list && !trigger.contains(e.target) && !list.contains(e.target)) {
      list.classList.remove('open');
      trigger.classList.remove('open');
      document.getElementById(ns+'-mem-arrow')?.classList.remove('open');
    }
  });
});

// ---- Navigation ----
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'attend') { renderMemberGrid('att-member-grid', []); renderAttendStatus(); initAttendPage(); }
  if (id === 'log') { renderLog(); populateFilterMembers(); }
  if (id === 'calendar') renderCalendar();
  if (id === 'stats') renderStats();
  if (id === 'members') renderMembers();
  if (id === 'record') {
    renderMemberGrid('rec-member-grid', []);
    document.getElementById('rec-date').value = getTodayJST();
    document.getElementById('rec-start').value = '09:00';
  }
  if (id === 'settings') document.getElementById('gas-url').value = gasUrl;
}

// ---- Helpers ----
function calcH(s, e) {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  if ([sh,sm,eh,em].some(isNaN)) return 0;
  return Math.max(0, ((eh * 60 + em) - (sh * 60 + sm)) / 60);
}
function fmtH(h) { const n = parseFloat(h); return isNaN(n) ? '0h' : (Math.round(n * 10) / 10) + 'h'; }
function initials(n) { const p = n.split(/[\s　]/); return p.length >= 2 ? p[0].slice(-1) + p[1][0] : n.slice(0, 2); }
function badgeClass(p) { return p >= 100 ? 'badge-done' : p >= 50 ? 'badge-mid' : 'badge-low'; }
function memArr(r) { return Array.isArray(r.members) ? r.members : []; }

// ---- Members ----
function addMember() {
  const inp = document.getElementById('new-mem'), n = inp.value.trim();
  if (!n) return;
  if (!state.members.includes(n)) { state.members.push(n); save(); }
  inp.value = ''; renderMembers(); renderMemberGrid('rec-member-grid', []);
  toast('メンバーを追加しました');
  if (gasUrl) pushMembersToCloud();
}
function deleteMember(name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  state.members = state.members.filter(m => m !== name);
  save(); renderMembers(); renderMemberGrid('rec-member-grid', []);
  if (gasUrl) pushMembersToCloud();
}
function renderMembers() {
  const el = document.getElementById('mem-list');
  if (!state.members.length) { el.innerHTML = '<p style="color:var(--text-hint);font-size:14px;text-align:center;padding:20px 0">メンバーが登録されていません</p>'; return; }
  el.innerHTML = state.members.map(m => {
    const h = state.records.reduce((s, r) => s + (memArr(r).includes(m) ? calcH(r.start, r.end) : 0), 0);
    return `<div class="mem-item">
      <div class="mem-left">
        <div class="avatar">${initials(m)}</div>
        <div><div class="mem-name">${m}</div><div class="mem-hrs">${fmtH(h)} 稼働</div></div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteMember('${m}')">削除</button>
    </div>`;
  }).join('');
}

// ---- Save Record ----
function saveRecord() {
  const date = document.getElementById('rec-date').value;
  const start = document.getElementById('rec-start').value;
  const end = document.getElementById('rec-end').value;
  const members = getSelectedMembers('rec');
  if (!date) { toast('⚠️ 作業日を入力してください'); return; }
  if (!members.length) { toast('⚠️ 作業者を選択してください'); return; }
  const rec = normalizeRecord({
    id: Date.now(), date, start, end,
    category: document.getElementById('rec-cat').value,
    detail: document.getElementById('rec-detail').value,
    progress: Number(document.getElementById('rec-prog').value),
    memo: document.getElementById('rec-memo').value,
    members
  });
  toast('⏳ 保存中...');
  document.getElementById('rec-detail').value = '';
  document.getElementById('rec-memo').value = '';
  document.getElementById('rec-prog').value = 50;
  document.getElementById('prog-num').textContent = '50%';
  document.getElementById('rec-start').value = '09:00';
  document.getElementById('rec-end').value = '15:00';
  renderMemberGrid('rec-member-grid', []);
  if (gasUrl) {
    pushRecordToCloud(rec);
  } else {
    state.records.unshift(rec); save();
    toast('✅ 記録を保存しました');
  }
}

// ---- Log ----
function populateFilterMembers() {
  const sel = document.getElementById('f-member'), cur = sel.value;
  sel.innerHTML = '<option value="">全メンバー</option>' + state.members.map(m => `<option value="${m}" ${cur===m?'selected':''}>${m}</option>`).join('');
}
function renderLog() {
  populateFilterMembers();
  const fm = document.getElementById('f-member').value;
  const fmon = document.getElementById('f-month').value;
  let recs = [...state.records];
  if (fm) recs = recs.filter(r => memArr(r).includes(fm));
  if (fmon) recs = recs.filter(r => r.date && r.date.split('-')[1] === fmon);
  const el = document.getElementById('log-list');
  if (!recs.length) { el.innerHTML = '<p style="color:var(--text-hint);font-size:14px;text-align:center;padding:32px 0">記録がありません</p>'; return; }
  el.innerHTML = recs.map(r => {
    const h = calcH(r.start, r.end), p = Number(r.progress) || 0;
    return `<div class="log-item">
      <div class="log-top">
        <span class="log-date">${r.date}　${r.start}〜${r.end}（${fmtH(h)}）</span>
        <span class="badge ${badgeClass(p)}">${p}%</span>
      </div>
      <div class="log-cat">${r.category}</div>
      <div class="log-detail">${r.detail||''}${r.memo?'\n📝 '+r.memo:''}</div>
      <div class="log-meta">👤 ${memArr(r).join('・')}</div>
      <div class="pbar"><div class="pbar-fill" style="width:${p}%"></div></div>
      <div class="log-actions">
        <button class="btn btn-secondary btn-sm" onclick="openEdit(${r.id})">✏️ 編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteById(${r.id})">🗑️ 削除</button>
      </div>
    </div>`;
  }).join('');
}

// ---- Edit ----
function openEdit(id) {
  const r = state.records.find(r => String(r.id) === String(id));
  if (!r) return;
  editId = id;
  document.getElementById('e-date').value = r.date;
  document.getElementById('e-start').value = r.start;
  document.getElementById('e-end').value = r.end;
  document.getElementById('e-cat').value = r.category;
  document.getElementById('e-detail').value = r.detail || '';
  document.getElementById('e-memo').value = r.memo || '';
  document.getElementById('e-prog').value = r.progress || 0;
  document.getElementById('e-prog-num').textContent = r.progress || 0;
  renderMemberGrid('edit-member-grid', memArr(r));
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); editId = null; }
function updateRecord() {
  const idx = state.records.findIndex(r => String(r.id) === String(editId));
  if (idx < 0) return;
  const members = getSelectedMembers('edit');
  if (!members.length) { toast('⚠️ 作業者を選択してください'); return; }
  const updated = {
    ...state.records[idx],
    date: document.getElementById('e-date').value,
    start: document.getElementById('e-start').value,
    end: document.getElementById('e-end').value,
    category: document.getElementById('e-cat').value,
    detail: document.getElementById('e-detail').value,
    memo: document.getElementById('e-memo').value,
    progress: Number(document.getElementById('e-prog').value),
    members
  };
  closeModal();
  if (gasUrl) {
    toast('⏳ 更新中...');
    pushUpdateToCloud(updated);
  } else {
    state.records[idx] = updated;
    save(); renderLog(); toast('✅ 更新しました');
  }
}

function deleteById(id) {
  if (!confirm('この記録を削除しますか？')) return;
  setStatus('削除中...', 'loading');
  if (gasUrl) {
    gasGet({ action: 'delete', data: JSON.stringify({ id: id }) })
      .then(() => syncAll())
      .catch(() => toast('⚠️ 削除に失敗しました'));
  } else {
    state.records = state.records.filter(r => r.id !== id);
    save(); renderLog(); toast('削除しました');
  }
}
function deleteRecord() {
  if (!confirm('この記録を削除しますか？')) return;
  const id = editId;
  closeModal();
  setStatus('削除中...', 'loading');
  if (gasUrl) {
    gasGet({ action: 'delete', data: JSON.stringify({ id: id }) })
      .then(() => syncAll())
      .catch(() => toast('⚠️ 削除に失敗しました'));
  } else {
    state.records = state.records.filter(r => r.id !== id);
    save(); renderLog(); toast('削除しました');
  }
}

// ---- Calendar ----
function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = `${calY}年 ${months[calM]}`;
  const first = new Date(calY, calM, 1).getDay(), days = new Date(calY, calM+1, 0).getDate(), prev = new Date(calY, calM, 0).getDate();
  const today = new Date(), wkDays = {};
  state.records.forEach(r => { if (!r.date) return; const [y,m,d] = r.date.split('-').map(Number); if (y===calY && m-1===calM) wkDays[d]=true; });
  let html = '';
  for (let i=0;i<first;i++) html += `<div class="cal-day other">${prev-first+1+i}</div>`;
  for (let d=1;d<=days;d++) { const isT=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear(); html += `<div class="cal-day ${wkDays[d]?'has-work':''} ${isT?'today':''}" onclick="showDay(${d})">${d}</div>`; }
  const rem=(7-((first+days)%7))%7; for (let i=1;i<=rem;i++) html+=`<div class="cal-day other">${i}</div>`;
  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-detail').innerHTML = '';
}
function calMove(d) { calM+=d; if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;} renderCalendar(); }
function showDay(d) {
  const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const recs=state.records.filter(r=>r.date===ds);
  const el=document.getElementById('cal-detail');
  if(!recs.length){el.innerHTML=`<p style="color:var(--text-hint);font-size:14px;text-align:center;padding:12px">${d}日の記録はありません</p>`;return;}
  el.innerHTML=recs.map(r=>`<div class="log-item">
    <div class="log-top"><span class="log-date">${r.start}〜${r.end}（${fmtH(calcH(r.start,r.end))}）</span><span class="badge ${badgeClass(r.progress)}">${r.progress}%</span></div>
    <div class="log-cat">${r.category}</div><div class="log-detail">${r.detail||''}</div>
    <div class="log-meta">👤 ${memArr(r).join('・')}</div>
    <button class="btn btn-secondary btn-sm" onclick="openEdit(${r.id})" style="margin-top:8px">✏️ 編集</button>
  </div>`).join('');
}

// ---- Stats ----
function toggleAcc(id) {
  const body = document.getElementById('acc-body-' + id);
  const arrow = document.getElementById('acc-arrow-' + id);
  if (!body || !arrow) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function renderStats() {
  const days = new Set(state.records.map(r => r.date)).size;

  // 1人あたり平均稼働時間
  let totalAll = 0;
  state.records.forEach(r => {
    const h = calcH(r.start, r.end), cnt = memArr(r).length;
    if (cnt > 0) totalAll += h * cnt;
  });
  const activeMembers = new Set(state.records.flatMap(r => memArr(r)));
  const avgHours = activeMembers.size > 0 ? totalAll / activeMembers.size : 0;
  document.getElementById('st-days').textContent = days;
  document.getElementById('st-hours').textContent = fmtH(avgHours);
  document.getElementById('st-hours-label').textContent = '1人あたり平均稼働時間';

  // ---- メンバー別稼働時間（タップで月別展開）----
  // メンバーごとの月別集計
  const mhTotal = {}; // メンバー → 総時間
  const mhMonth = {}; // メンバー → { 'yyyy-mm': 時間 }
  state.members.forEach(m => { mhTotal[m] = 0; mhMonth[m] = {}; });
  state.records.forEach(r => {
    const h = calcH(r.start, r.end);
    const ym = r.date ? r.date.slice(0, 7) : ''; // 'yyyy-mm'
    memArr(r).forEach(m => {
      mhTotal[m] = (mhTotal[m] || 0) + h;
      if (ym) {
        mhMonth[m] = mhMonth[m] || {};
        mhMonth[m][ym] = (mhMonth[m][ym] || 0) + h;
      }
    });
  });

  const maxM = Math.max(1, ...Object.values(mhTotal).filter(v => !isNaN(v)));
  const memHtml = Object.entries(mhTotal)
    .sort((a, b) => b[1] - a[1])
    .map(([name, total], idx) => {
      const safeId = 'mem-' + idx;
      const months = Object.entries(mhMonth[name] || {})
        .sort((a, b) => b[0].localeCompare(a[0])) // 新しい月順
        .map(([ym, h]) => {
          const [y, m] = ym.split('-');
          return `<div class="acc-item">
            <span class="acc-item-name">${parseInt(y)}年${parseInt(m)}月</span>
            <span class="acc-item-hrs">${fmtH(h)}</span>
          </div>`;
        }).join('');
      const pct = Math.round(total / maxM * 100);
      return `<div class="acc-row">
        <div class="acc-header" onclick="toggleAcc('${safeId}')">
          <span class="acc-title">${name}</span>
          <div class="acc-right">
            <span class="acc-hrs">${fmtH(total)}</span>
            <span class="acc-arrow" id="acc-arrow-${safeId}">▼</span>
          </div>
        </div>
        <div class="acc-bar"><div class="acc-bar-fill" style="width:${pct}%"></div></div>
        <div class="acc-body" id="acc-body-${safeId}">
          ${months || '<div class="acc-item"><span class="acc-item-name">記録なし</span></div>'}
        </div>
      </div>`;
    }).join('');
  document.getElementById('stats-mem').innerHTML = memHtml || '<p style="color:var(--text-hint);font-size:14px">データがありません</p>';

  // ---- カテゴリ別（タップで担当者別時間展開）----
  const catTotal = {}; // カテゴリ → 総時間（延べ）
  const catMem = {};   // カテゴリ → { メンバー名: 時間 }
  state.records.forEach(r => {
    const h = calcH(r.start, r.end);
    const cat = r.category;
    const cnt = memArr(r).length || 1;
    catTotal[cat] = (catTotal[cat] || 0) + h * cnt;
    catMem[cat] = catMem[cat] || {};
    memArr(r).forEach(m => {
      catMem[cat][m] = (catMem[cat][m] || 0) + h;
    });
  });

  // カテゴリ別平均（総時間 ÷ 延べ人数）
  const catCnt = {};
  state.records.forEach(r => {
    catCnt[r.category] = (catCnt[r.category] || 0) + (memArr(r).length || 1);
  });
  const catAvg = {};
  Object.keys(catTotal).forEach(c => {
    catAvg[c] = catCnt[c] > 0 ? catTotal[c] / catCnt[c] : 0;
  });

  const maxC = Math.max(1, ...Object.values(catAvg).filter(v => !isNaN(v)));
  const catHtml = Object.entries(catAvg)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, avg], idx) => {
      const safeId = 'cat-' + idx;
      const pct = Math.round(avg / maxC * 100);
      const memDetail = Object.entries(catMem[cat] || {})
        .sort((a, b) => b[1] - a[1])
        .map(([m, h]) => `<div class="acc-item">
          <span class="acc-item-name">${m}</span>
          <span class="acc-item-hrs">${fmtH(h)}</span>
        </div>`).join('');
      return `<div class="acc-row">
        <div class="acc-header" onclick="toggleAcc('${safeId}')">
          <span class="acc-title">${cat}</span>
          <div class="acc-right">
            <span class="acc-hrs">${fmtH(avg)}</span>
            <span class="acc-arrow" id="acc-arrow-${safeId}">▼</span>
          </div>
        </div>
        <div class="acc-bar"><div class="acc-bar-fill" style="width:${pct}%"></div></div>
        <div class="acc-body" id="acc-body-${safeId}">
          ${memDetail || '<div class="acc-item"><span class="acc-item-name">記録なし</span></div>'}
        </div>
      </div>`;
    }).join('');
  document.getElementById('stats-cat').innerHTML = catHtml || '<p style="color:var(--text-hint);font-size:14px">データがありません</p>';
}

// ---- CSV ----
function exportCSV() {
  if (!state.records.length) { toast('⚠️ 記録がありません'); return; }
  const h='作業日,開始,終了,時間(h),カテゴリ,作業内容,進捗(%),メンバー,メモ';
  const rows=state.records.map(r=>[r.date,r.start,r.end,fmtH(calcH(r.start,r.end)),r.category,`"${(r.detail||'').replace(/"/g,'""')}"`,r.progress,`"${memArr(r).join('・')}"`,`"${(r.memo||'').replace(/"/g,'""')}"`].join(','));
  const csv='\uFEFF'+h+'\n'+rows.join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='農作業記録_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('📥 CSVを出力しました');
}

// ---- Cloud ----
async function gasGet(params) {
  const res = await fetch(gasUrl + '?' + new URLSearchParams(params).toString());
  return res.json();
}

// 時刻・日付の正規化（1899年対策）
function normalizeRecord(r) {
  function fixTime(val) {
    if (!val) return '';
    var s = String(val);
    if (s.includes('1899') || (s.includes('T') && s.includes(':'))) {
      var d = new Date(val);
      if (!isNaN(d.getTime())) {
        return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0');
      }
    }
    return s;
  }
  function fixDate(val) {
    if (!val) return '';
    var s = String(val);
    if (s.includes('T')) return s.split('T')[0];
    return s;
  }
  return Object.assign({}, r, {
    date: fixDate(r.date),
    start: fixTime(r.start),
    end: fixTime(r.end),
    members: Array.isArray(r.members) ? r.members : []
  });
}

// ☁️同期：クラウドのデータでローカルを完全上書き（クラウド優先）
async function syncAll() {
  if (!gasUrl) { toast('⚠️ 設定画面でURLを入力してください'); return; }
  const fab = document.getElementById('sync-fab');
  fab.classList.add('syncing'); setStatus('同期中...', 'loading');
  try {
    const data = await gasGet({ action: 'getAll' });
    if (data.records) {
      state.records = data.records.map(normalizeRecord);
      state.records.sort((a, b) => (b.date||'').localeCompare(a.date||'') || b.id - a.id);
    }
    if (data.members && data.members.length) {
      state.members = data.members;
    }
    if (data.attendances) {
      state.attendances = data.attendances;
    }
    save();
    toast('☁️ 同期完了');
    setStatus('同期済み ✓', 'ok');
    refreshCurrentPage();
  } catch(e) {
    toast('⚠️ 同期に失敗しました'); setStatus('接続エラー', 'err');
  }
  fab.classList.remove('syncing');
  setTimeout(() => setStatus('', ''), 4000);
}

// 記録追加：クラウドに書き込み → 同期
async function pushRecordToCloud(rec) {
  if (!gasUrl) return;
  try {
    await gasGet({ action: 'add', data: JSON.stringify(rec) });
    await syncAll();
  } catch(e) { toast('⚠️ クラウドへの保存に失敗しました'); }
}

// 編集：クラウドに書き込み → 同期
async function pushUpdateToCloud(rec) {
  if (!gasUrl) return;
  try {
    await gasGet({ action: 'update', data: JSON.stringify(rec) });
    await syncAll();
  } catch(e) { toast('⚠️ クラウドへの更新に失敗しました'); }
}

// メンバー：クラウドに書き込み → 同期
async function pushMembersToCloud() {
  if (!gasUrl) return;
  try {
    await gasGet({ action: 'syncMembers', data: JSON.stringify(state.members) });
    await syncAll();
  } catch(e) { toast('⚠️ メンバーの同期に失敗しました'); }
}

// 現在のページを再描画
function refreshCurrentPage() {
  const cur = document.querySelector('.page.active')?.id?.replace('page-', '');
  if (cur === 'log') renderLog();
  if (cur === 'calendar') renderCalendar();
  if (cur === 'stats') renderStats();
  if (cur === 'members') renderMembers();
  if (cur === 'attend') { renderAttendStatus(); }
  if (cur === 'record') renderMemberGrid('rec-member-grid', []);
}

async function testConnection() {
  if (!gasUrl) { toast('URLを入力してください'); return; }
  setStatus('接続テスト中...', 'loading');
  try {
    const data = await gasGet({ action: 'test' });
    if (data.ok) { toast('✅ 接続成功！'); setStatus('接続OK ✓', 'ok'); }
    else { toast('⚠️ 接続失敗'); setStatus('接続エラー', 'err'); }
  } catch(e) { toast('⚠️ 接続できませんでした'); setStatus('接続エラー', 'err'); }
  setTimeout(() => setStatus('', ''), 4000);
}

// ---- 出勤機能 ----
function initAttendPage() {
  document.getElementById('att-date').value = getTodayJST();
  // 現在時刻を日本時間でセット
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const hh = String(jst.getUTCHours()).padStart(2, '0');
  const mm = String(jst.getUTCMinutes()).padStart(2, '0');
  document.getElementById('att-time').value = hh + ':' + mm;
  renderMemberGrid('att-member-grid', []);
}

function saveAttend() {
  const date = document.getElementById('att-date').value;
  const time = document.getElementById('att-time').value;
  const members = getSelectedMembers('att');
  if (!date) { toast('⚠️ 作業日を入力してください'); return; }
  if (!members.length) { toast('⚠️ 出勤者を選択してください'); return; }
  if (!time) { toast('⚠️ 出勤時刻を入力してください'); return; }

  // 既存の出勤記録と重複チェック（同日同人は上書き）
  if (!state.attendances) state.attendances = [];
  members.forEach(m => {
    const existing = state.attendances.findIndex(a => a.date === date && a.member === m);
    if (existing >= 0) {
      state.attendances[existing].time = time;
    } else {
      state.attendances.push({ id: Date.now() + Math.random(), date, member: m, time });
    }
  });
  save();
  toast('✅ 出勤を記録しました');

  // プルダウンリセット
  renderMemberGrid('att-member-grid', []);
  renderAttendStatus();

  // クラウドに同期
  if (gasUrl) pushAttendToCloud();
}

function renderAttendStatus() {
  const el = document.getElementById('attend-status-list');
  if (!el) return;
  const today = getTodayJST();
  const todayAttends = (state.attendances || []).filter(a => a.date === today);

  if (!state.members.length) {
    el.innerHTML = '<p style="color:var(--text-hint);font-size:14px;text-align:center;padding:16px 0">メンバーが登録されていません</p>';
    return;
  }

  // 出勤済みのみ表示
  const attendedList = state.members
    .map(m => ({ m, att: todayAttends.find(a => a.member === m) }))
    .filter(({ att }) => att);

  if (!attendedList.length) {
    el.innerHTML = '<p style="color:var(--text-hint);font-size:14px;text-align:center;padding:16px 0">本日の出勤記録はありません</p>';
    return;
  }

  el.innerHTML = attendedList.map(({ m, att }) =>
    `<div class="attend-status-item">
      <span class="attend-name">${m}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="attend-time">${att.time}</span>
        <span class="attend-badge">出勤済</span>
      </div>
    </div>`
  ).join('');
}

// 記録ページ：作業者選択時に出勤時刻を自動セット
function applyAttendTime() {
  const date = document.getElementById('rec-date').value;
  if (!date || !state.attendances) return;
  const selected = getSelectedMembers('rec');
  if (!selected.length) {
    // 選択者がいなくなったらデフォルトに戻す
    document.getElementById('rec-start').value = '09:00';
    return;
  }
  // 選択したメンバーの中で最も早い出勤時刻を取得
  const times = selected.map(m => {
    const att = state.attendances.find(a => a.date === date && a.member === m);
    return att ? att.time : null;
  }).filter(Boolean).sort(); // 文字列ソートで HH:MM は正しく昇順になる
  if (times.length > 0) {
    // 最も早い出勤時刻を開始時間にセット
    document.getElementById('rec-start').value = times[0];
  } else {
    // 出勤記録のないメンバーのみ選択の場合は09:00のまま
    document.getElementById('rec-start').value = '09:00';
  }
}

async function pushAttendToCloud() {
  if (!gasUrl) return;
  try {
    await gasGet({ action: 'syncAttend', data: JSON.stringify(state.attendances || []) });
  } catch(e) { console.warn('attend sync failed', e); }
}

function clearLocal() {
  if (!confirm('ローカルデータを全削除しますか？')) return;
  state = { members: [], records: [], attendances: [] }; save(); toast('リセットしました');
}

// 日本時間で今日の日付を取得（UTC+9時間のずれを補正）
function getTodayJST() {
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return jst.toISOString().slice(0, 10);
}
document.getElementById('rec-date').value = getTodayJST();
renderMemberGrid('rec-member-grid', []);

document.getElementById('att-time').value = String(_jst.getUTCHours()).padStart(2,'0')+':'+String(_jst.getUTCMinutes()).padStart(2,'0');
</script>
